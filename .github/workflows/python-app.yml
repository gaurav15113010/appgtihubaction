name: Python CI

#Trigger the workflow on any push to the main or pull request
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:                      # We might have multiple jobs in the future, so we define a job matrix
  test:                    # Name of the job
    runs-on: ubuntu-latest # container provided by GitHub Actions, we also get windows-latest and macos-latest  

    steps:
      #Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      #Step 2: Set up Python environment
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      #Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      #Step 4: Run unit tests
      - name: Run unit tests
        run: pytest  
